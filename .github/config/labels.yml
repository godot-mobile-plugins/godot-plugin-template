- name: android
  color: '#3DDC84'
  description: Pertains to Android-specific features, APIs, or integration
- name: ios
  color: '#5E5CE6'
  description: Pertains to iOS-specific features, APIs, or integration
- name: gdscript
  color: '#478CBF'
  description: Issues concerning GDScript API wrappers and bindings
- name: build system
  color: '#E3B341'
  description: Pertains to compilation, dependencies, or CI/CD pipelines
- name: documentation
  color: '#9B59B6'
  description: Missing, inaccurate, or unclear documentation
- name: reported bug
  color: '#E74C3C'
  description: Potential bug that requires investigation and triage
- name: confirmed bug
  color: '#900C3F'
  description: Reproduced and confirmed bug requiring a fix
- name: feature request
  color: '#00BCD4'
  description: Suggestion for a new feature or enhancement
- name: invalid
  color: '#FF9800'
  description: Does not apply, is fundamentally incorrect, or intended behavior
- name: not reproducible
  color: '#FFC107'
  description: Cannot be replicated using the provided instructions
- name: duplicate
  color: '#9E9E9E'
  description: Already tracked in another existing issue
- name: question
  color: '#BA68C8'
  description: Request for help, usage clarification, or technical support
- name: help wanted
  color: '#009688'
  description: Open to community contributions and pull requests
- name: export
  color: '#795548'
  description: Issues encountered during Godot's project export process
- name: editor
  color: '#607D8B'
  description: Affects Godot Editor UI, custom nodes, or plugin management
- name: device
  color: '#CDDC39'
  description: Run-time issues occurring specifically on physical mobile hardware
- name: simulator
  color: '#03A9F4'
  description: Run-time issues occurring specifically on emulators or simulators
