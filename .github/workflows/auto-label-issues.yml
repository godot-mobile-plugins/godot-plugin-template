name: Auto Label Issues
on:
  issues:
    types:
      - opened
jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write  # Required to apply labels to the issue
      contents: read  # Required to read the labels.yml file
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: 3.x
      - name: Install Dependencies
        run: pip install pyyaml google-genai
      - name: Load Labels Configuration
        id: load_config
        run: |-
          python - <<'EOF'
          import os, yaml, json
          try:
              with open('.github/config/labels.yml', 'r') as f:
                  labels_data = yaml.safe_load(f)
          except Exception as e:
              print(f"Error reading labels.yml: {e}")
              exit(1)
          valid_labels = {item['name']: item['description'] for item in labels_data if item and 'name' in item}
          valid_label_names = list(valid_labels.keys())

          # Output configurations as single-line JSON strings
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"labels_json={json.dumps(valid_labels)}\n")
              f.write(f"label_names={json.dumps(valid_label_names)}\n")
          EOF
      - name: Analyze Issue with Gemini
        id: gemini_analysis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          VALID_LABELS: ${{ steps.load_config.outputs.labels_json }}
          VALID_LABEL_NAMES: ${{ steps.load_config.outputs.label_names }}
        run: |-
          python - <<'EOF'
          import os, json
          from google import genai
          from google.genai import types
          valid_labels = json.loads(os.environ['VALID_LABELS'])
          valid_label_names = json.loads(os.environ['VALID_LABEL_NAMES'])
          client = genai.Client(api_key=os.environ['GEMINI_API_KEY'])
          prompt = f"""
          You are an automated triage assistant for a Godot game engine plugin GitHub repository dealing with Android,
          iOS, and GDScript.
          Your task is to analyze the following GitHub issue and return the most appropriate label names.
          Valid Labels and their descriptions:
          {json.dumps(valid_labels, indent=2)}
          Issue Title: {os.environ.get('ISSUE_TITLE', '')}
          Issue Body:
          {os.environ.get('ISSUE_BODY', '')}
          """
          print("Sending prompt to Gemini...")
          try:
              response = client.models.generate_content(
                  model='gemini-2.5-flash',
                  contents=prompt,
                  config=types.GenerateContentConfig(
                      response_mime_type="application/json",
                      response_schema={
                          "type": "ARRAY",
                          "items": {
                              "type": "STRING",
                              "enum": valid_label_names
                          }
                      }
                  )
              )
              selected_labels = json.loads(response.text.strip())
          except Exception as e:
              print(f"Error during Gemini processing: {e}")
              exit(1)
          if not selected_labels:
              print("Gemini determined no labels are applicable.")
              labels_str = ""
          else:
              print(f"Gemini selected labels: {selected_labels}")
              labels_str = ",".join(selected_labels)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"labels={labels_str}\n")
          EOF
      - name: Apply Labels to Issue
        if: ${{ steps.gemini_analysis.outputs.labels != '' }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |-
          gh issue edit ${{ github.event.issue.number }} --add-label "${{ steps.gemini_analysis.outputs.labels }}"
