name: iOS Build

on:
  pull_request:
    branches: [ main ]
    paths:
      - 'common/config/**'
      - 'common/**/*.gradle.kts'
      - 'ios/src/**'
      - 'ios/config/**'
      - 'ios/**/*.gradle.kts'
      - 'ios/*.xcodeproj/**'

jobs:
  build-ios-debug:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v6

      - name: Install Node
        uses: ./.github/actions/install-node

      - name: Set up JDK
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 17

      - name: Download Godot
        working-directory: common
        run: ./gradlew downloadGodot --stacktrace

      - name: Install SCons
        if: env.ACT != 'true'
        run: pip install scons

      - name: Generate Godot Headers
        working-directory: common
        run: ./gradlew generateGodotHeaders --stacktrace

      - name: Build iOS debug
        working-directory: common
        run: ./gradlew buildiOSDebug --stacktrace
