name: YAML, GitHub Action, and GitHub Workflow Style
on:
  pull_request:
    branches:
      - main
    paths:
      - .github/**/*.yml
      - .github/**/*.yaml
jobs:
  validate-actions:
    name: Lint and Validate YAML
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
      - name: Install Linting Tools
        run: |
          # Install yamllint for style checking
          sudo apt-get update
          sudo apt-get install -y yamllint

          # Download actionlint for GitHub Actions syntax validation
          bash <(curl -s https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash)
          sudo mv actionlint /usr/local/bin/
      - name: Check YAML Style (yamllint)
        run: |
          yamllint .github/ --config-file .github/config/.yamllint.yml
      - name: Validate Actions Syntax (actionlint)
        run: |-
          # Run actionlint from repository root to ensure it checks all relevant files
          actionlint
